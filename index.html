<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yatzy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e17; --surface:#1a1828; --surface2:#231f35; --surface3:#2d2845;
  --accent:#ff6b35; --accent2:#ffd166; --gold:#f5c518; --green:#06d6a0;
  --blue:#118ab2; --text:#fffffe; --text2:#a7a3c2; --text3:#6b6884;
  --border:rgba(255,255,255,0.08); --radius:12px; --dice-size:80px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,107,53,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(17,138,178,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
.app{max-width:1100px;margin:0 auto;padding:20px;position:relative;z-index:1;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.logo{font-family:'DM Serif Display',serif;font-size:2.4em;letter-spacing:-1px;}
.logo span{color:var(--accent);font-style:italic;}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:0.8em;color:var(--text2);font-family:'DM Mono',monospace;}
.pill strong{color:var(--text);}

/* AUTH WIDGET */
.auth-widget{display:flex;align-items:center;gap:10px;}
.auth-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid var(--accent);}
.auth-avatar-initials{width:32px;height:32px;border-radius:50%;background:var(--surface3);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.75em;font-weight:500;color:var(--accent2);}
.auth-name{font-size:0.85em;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* BUTTONS */
.btn{font-family:'DM Sans',sans-serif;font-weight:500;border:none;border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:0.9em;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);padding:8px 16px;}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-accent{background:var(--accent);color:#fff;padding:10px 22px;font-size:1em;}
.btn-accent:hover{background:#e85a28;transform:translateY(-1px);}
.btn-accent:disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed;transform:none;}
.btn-sm{padding:6px 14px;font-size:0.82em;}
.btn-google{display:flex;align-items:center;gap:10px;background:#fff;color:#1f1f1f;border:none;padding:11px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.95em;font-weight:500;cursor:pointer;transition:all 0.2s;width:100%;}
.btn-google:hover{background:#f5f5f5;transform:translateY(-1px);}
.btn-google svg{flex-shrink:0;}

/* PLAYERS BAR */
.players-bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.player-tab{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.player-tab.active{border-color:var(--accent);background:var(--surface2);}
.player-tab.active::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
.player-tab.done{opacity:0.5;}
.player-name{font-weight:500;font-size:0.95em;margin-bottom:3px;}
.player-score-display{font-family:'DM Mono',monospace;font-size:1.4em;font-weight:500;color:var(--accent2);}
.player-tag{font-size:0.72em;color:var(--text3);margin-top:2px;}

/* GAME GRID */
.game-grid{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;}
@media(max-width:800px){.game-grid{grid-template-columns:1fr;}}

/* DICE */
.dice-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;}
.dice-area-label{font-size:0.72em;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:20px;font-family:'DM Mono',monospace;}
.dice-row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:28px;}
.die-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform 0.15s;}
.die-wrap:hover .die{border-color:rgba(255,255,255,0.3);}
.die-wrap.held .die{background:var(--accent);border-color:var(--accent);transform:translateY(-6px);box-shadow:0 8px 20px rgba(255,107,53,0.4);}
.die{width:var(--dice-size);height:var(--dice-size);background:var(--surface3);border:1.5px solid var(--border);border-radius:14px;position:relative;transition:all 0.25s;display:flex;align-items:center;justify-content:center;}
.die.rolling{animation:dieRoll 0.5s ease-in-out;}
@keyframes dieRoll{0%{transform:rotate(0deg) scale(1);}20%{transform:rotate(-15deg) scale(1.05);}50%{transform:rotate(20deg) scale(0.95);}80%{transform:rotate(-8deg) scale(1.03);}100%{transform:rotate(0deg) scale(1);}}
.die-hold-label{font-size:0.68em;text-transform:uppercase;letter-spacing:1px;color:var(--text3);transition:color 0.2s;}
.die-wrap.held .die-hold-label{color:var(--accent);}
.die svg{width:100%;height:100%;}
.dice-controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;}

/* JOKER BANNER */
.joker-banner{margin-top:16px;padding:12px 16px;background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);border-radius:8px;font-size:0.85em;color:var(--gold);display:none;}
.joker-banner.show{display:block;}

/* BONUS METER */
.bonus-meter{margin:0 0 20px;}
.bonus-meter-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.8em;color:var(--text2);}
.bonus-meter-label strong{color:var(--gold);}
.meter-track{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.meter-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold) 0%,var(--accent) 100%);transition:width 0.6s cubic-bezier(.4,0,.2,1);}

/* SUGGESTION */
.suggestion{margin-top:20px;padding:14px 16px;background:rgba(6,214,160,0.07);border:1px solid rgba(6,214,160,0.2);border-radius:8px;font-size:0.85em;}
.suggestion-label{color:var(--green);font-weight:500;margin-bottom:3px;font-size:0.8em;text-transform:uppercase;letter-spacing:1px;}
.suggestion-text{color:var(--text2);}
.suggestion-text strong{color:var(--text);}

/* SCORECARD */
.scorecard-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.scorecard-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:0.72em;text-transform:uppercase;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;display:flex;justify-content:space-between;align-items:center;}
.undo-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);padding:3px 10px;cursor:pointer;font-size:0.9em;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.undo-btn:hover{border-color:var(--accent);color:var(--accent);}
.undo-btn:disabled{opacity:0.3;cursor:not-allowed;}
.section-sep{padding:8px 18px;background:var(--surface3);font-size:0.72em;text-transform:uppercase;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;}
.score-row{display:grid;grid-template-columns:1fr 52px 52px;padding:9px 18px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background 0.15s;position:relative;}
.score-row:hover:not(.scored):not(.locked){background:var(--surface2);}
.score-row.available:not(.scored){background:rgba(255,209,102,0.04);}
.score-row.available:not(.scored)::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent2);}
.score-row.scored{cursor:default;}
.score-row.best-suggestion:not(.scored){background:rgba(6,214,160,0.06);}
.score-row.best-suggestion:not(.scored)::before{background:var(--green)!important;}
.score-row.joker-forced:not(.scored){background:rgba(245,197,24,0.08);}
.score-row.joker-forced:not(.scored)::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);}
.score-row.locked{cursor:default;opacity:0.4;}
.row-name{font-size:0.88em;color:var(--text2);}
.score-row.scored .row-name{color:var(--text3);}
.row-score{text-align:center;font-family:'DM Mono',monospace;font-size:0.95em;font-weight:500;color:var(--text);}
.row-potential{text-align:center;font-family:'DM Mono',monospace;font-size:0.85em;color:var(--text3);transition:color 0.2s;}
.row-potential.bright{color:var(--accent2);font-weight:500;}
.total-row{display:grid;grid-template-columns:1fr 52px 52px;padding:10px 18px;align-items:center;}
.total-row .row-name{font-weight:500;font-size:0.88em;}
.total-row .row-score{color:var(--accent2);}
.yatzy-bonus-row{display:grid;grid-template-columns:1fr 52px 52px;padding:9px 18px;align-items:center;background:rgba(245,197,24,0.05);border-bottom:1px solid var(--border);}
.yatzy-bonus-row .row-name{font-size:0.88em;color:var(--gold);}
.yatzy-bonus-row .row-score{color:var(--gold);font-family:'DM Mono',monospace;font-weight:500;text-align:center;}
.grand-row{display:grid;grid-template-columns:1fr 52px 52px;padding:14px 18px;background:var(--surface3);align-items:center;}
.grand-row .row-name{font-family:'DM Serif Display',serif;font-size:1.1em;}
.grand-row .row-score{font-family:'DM Mono',monospace;font-size:1.3em;color:var(--accent);font-weight:500;text-align:center;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.modal-backdrop.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;max-width:480px;width:90%;text-align:center;transform:scale(0.9);transition:transform 0.3s;max-height:85vh;overflow-y:auto;}
.modal-backdrop.show .modal{transform:scale(1);}
.modal h2{font-family:'DM Serif Display',serif;font-size:2.2em;margin-bottom:8px;}
.modal-sub{color:var(--text3);margin-bottom:28px;font-size:0.9em;}
.score-table{width:100%;margin-bottom:24px;}
.score-table td{padding:7px 0;font-size:0.9em;border-bottom:1px solid var(--border);}
.score-table td:last-child{text-align:right;font-family:'DM Mono',monospace;font-weight:500;}
.final-big{font-family:'DM Serif Display',serif;font-size:3.5em;color:var(--accent);margin:16px 0;letter-spacing:-2px;}
.modal-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.pb-badge{display:inline-block;background:rgba(245,197,24,0.15);border:1px solid rgba(245,197,24,0.3);color:var(--gold);border-radius:20px;padding:4px 14px;font-size:0.8em;margin-bottom:16px;}
.modal-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.or-text{color:var(--text3);font-size:0.82em;margin:14px 0;}

/* SETUP */
.setup-modal{max-width:380px;}
.setup-modal h2{font-size:2em;}
.player-inputs{display:flex;flex-direction:column;gap:10px;margin:20px 0;}
.player-input-row{display:flex;gap:8px;align-items:center;}
.player-input{flex:1;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95em;outline:none;transition:border-color 0.2s;}
.player-input:focus{border-color:var(--accent);}
.player-count-btns{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
.count-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface3);color:var(--text2);cursor:pointer;font-size:0.95em;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.count-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* CONFETTI */
.confetti-piece{position:fixed;pointer-events:none;z-index:999;border-radius:2px;animation:confettiFall var(--dur) var(--delay) ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* TOASTS */
.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:0.88em;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.2s forwards;min-width:180px;}
.toast.success{border-color:rgba(6,214,160,0.4);color:var(--green);}
.toast.info{border-color:rgba(255,209,102,0.3);color:var(--accent2);}
.toast.warn{border-color:rgba(255,107,53,0.4);color:var(--accent);}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

/* HISTORY */
.history-section{margin-top:20px;}
.history-toggle{background:none;border:none;color:var(--text3);font-size:0.8em;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif;}
.history-list{margin-top:8px;display:none;}
.history-list.open{display:block;}
.history-entry{display:flex;justify-content:space-between;padding:4px 0;font-size:0.82em;color:var(--text3);font-family:'DM Mono',monospace;border-bottom:1px solid var(--border);}
.history-entry:last-child{border-bottom:none;}
@keyframes scoreFlash{0%{background:rgba(255,107,53,0.3);}100%{background:transparent;}}
.flash{animation:scoreFlash 0.7s ease;}
@keyframes yatzyFlash{0%{background:rgba(245,197,24,0.4);}100%{background:transparent;}}
.yatzy-flash{animation:yatzyFlash 0.7s ease;}

.hidden{display:none!important;}
@media(max-width:600px){
  :root{--dice-size:62px;}
  .logo{font-size:1.8em;}
  .die{border-radius:10px;}
  .game-grid{gap:16px;}
  .dice-area{padding:20px 14px;}
  .score-row{padding:8px 12px;}
  .section-sep{padding:6px 12px;}
  .total-row,.grand-row,.yatzy-bonus-row{padding:10px 12px;}
  .scorecard-header{padding:10px 12px;}
}
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="logo">Yat<span>zy</span></div>
    <div class="header-right">
      <div class="pill">Turn <strong id="hdr-turn">1</strong>/13</div>
      <div class="pill">Roll <strong id="hdr-roll">1</strong>/3</div>
      <div class="auth-widget" id="auth-widget">
        <!-- filled by renderAuthWidget() -->
      </div>
      <button class="btn btn-ghost btn-sm" id="new-game-btn">New game</button>
    </div>
  </header>

  <div class="players-bar" id="players-bar"></div>

  <div class="game-grid">
    <div>
      <div class="dice-area">
        <div class="dice-area-label">Dice</div>
        <div class="bonus-meter">
          <div class="bonus-meter-label">
            <span>Upper bonus progress</span>
            <strong id="bonus-progress-label">0 / 63</strong>
          </div>
          <div class="meter-track"><div class="meter-fill" id="bonus-fill" style="width:0%"></div></div>
        </div>
        <div class="dice-row" id="dice-row"></div>
        <div class="dice-controls">
          <button class="btn btn-accent" id="roll-btn">Roll dice</button>
          <button class="btn btn-ghost" id="release-btn">Release all</button>
        </div>
        <div class="joker-banner" id="joker-banner">
          ⭐ Bonus Yatzy! Use it as a joker — pick any open category.
        </div>
        <div class="suggestion hidden" id="suggestion">
          <div class="suggestion-label">💡 Best move</div>
          <div class="suggestion-text" id="suggestion-text"></div>
        </div>
      </div>
      <div class="history-section">
        <button class="history-toggle" id="history-toggle">Show score history ▾</button>
        <div class="history-list" id="history-list"></div>
      </div>
    </div>

    <div class="scorecard-wrap">
      <div class="scorecard-header">
        <span>Scorecard</span>
        <button class="undo-btn" id="undo-btn" disabled>↩ Undo</button>
      </div>
      <div id="scorecard-body"></div>
    </div>
  </div>
</div>

<!-- SETUP MODAL -->
<div class="modal-backdrop show" id="setup-backdrop">
  <div class="modal setup-modal">
    <h2>Yatzy</h2>
    <div class="modal-sub">How many players?</div>
    <div class="player-count-btns" id="count-btns">
      <button class="count-btn active" data-n="1">1</button>
      <button class="count-btn" data-n="2">2</button>
      <button class="count-btn" data-n="3">3</button>
      <button class="count-btn" data-n="4">4</button>
    </div>
    <div class="player-inputs" id="player-inputs"></div>
    <button class="btn btn-accent" id="start-btn" style="width:100%;padding:14px">Start game</button>
  </div>
</div>

<!-- GAME OVER MODAL -->
<div class="modal-backdrop" id="gameover-backdrop">
  <div class="modal">
    <div id="gameover-content"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="replay-same-btn">Same players</button>
      <button class="btn btn-accent" id="new-players-btn">New game</button>
    </div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="modal-backdrop" id="auth-backdrop">
  <div class="modal" style="max-width:360px">
    <h2>Sign in</h2>
    <div class="modal-sub">Save scores to the leaderboard</div>
    <button class="btn-google" id="google-signin-btn">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="or-text">— or play as guest —</div>
    <button class="btn btn-ghost" id="guest-continue-btn" style="width:100%;padding:11px">Continue without signing in</button>
    <button class="btn btn-ghost btn-sm" id="auth-close-btn" style="margin-top:12px;width:100%">Cancel</button>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, serverTimestamp, collection, addDoc, query, orderBy, limit, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ─── FIREBASE CONFIG ──────────────────────────────────────────────────────────
// TODO: Replace with your actual Firebase config from console.firebase.google.com
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDQE9zo0CS_yV7HTttEMLWXTGgcGXpjD1w",
  authDomain: "yatzy-d5d18.firebaseapp.com",
  projectId: "yatzy-d5d18",
  storageBucket: "yatzy-d5d18.firebasestorage.app",
  messagingSenderId: "902576814145",
  appId: "1:902576814145:web:003ef659c75e7b37feaec0",
  measurementId: "G-9Q3J34VL1M"
};

// Detect if config is still placeholder
const FIREBASE_READY = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";

let app, auth, db, currentUser = null;

if (FIREBASE_READY) {
  app  = initializeApp(FIREBASE_CONFIG);
  auth = getAuth(app);
  db   = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    currentUser = user;
    if (user) {
      // Upsert user profile
      const ref = doc(db, 'users', user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          displayName: user.displayName,
          avatarUrl:   user.photoURL,
          gamesPlayed: 0,
          highScore:   0,
          totalScore:  0,
          joinedAt:    serverTimestamp()
        });
      }
    }
    renderAuthWidget();
  });
}

// ─── AUTH ACTIONS ─────────────────────────────────────────────────────────────
window._signInWithGoogle = async () => {
  if (!FIREBASE_READY) { toast('Add your Firebase config first','warn'); return; }
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
    document.getElementById('auth-backdrop').classList.remove('show');
    toast('Signed in!', 'success');
  } catch(e) {
    console.error(e);
    toast('Sign-in failed', 'warn');
  }
};

window._signOut = async () => {
  if (!FIREBASE_READY) return;
  await signOut(auth);
  currentUser = null;
  renderAuthWidget();
  toast('Signed out', 'info');
};

// ─── SAVE SCORE TO FIRESTORE ──────────────────────────────────────────────────
window._saveScoreToFirestore = async (playerObj, totalScore) => {
  if (!FIREBASE_READY || !currentUser) return;
  try {
    const userRef = doc(db, 'users', currentUser.uid);
    await updateDoc(userRef, {
      gamesPlayed: increment(1),
      totalScore:  increment(totalScore),
      highScore:   Math.max((await getDoc(userRef)).data().highScore || 0, totalScore)
    });
    // leaderboard entry
    await addDoc(collection(db, 'leaderboard', 'allTime', 'scores'), {
      uid:         currentUser.uid,
      displayName: currentUser.displayName,
      avatarUrl:   currentUser.photoURL,
      score:       totalScore,
      yatzyBonuses: playerObj.yatzyBonuses || 0,
      bonusEarned:  (upperSubtotal(playerObj) >= 63),
      playedAt:    serverTimestamp()
    });
    toast('Score saved to leaderboard!', 'success');
  } catch(e) {
    console.error('Firestore save error:', e);
  }
};

// ─── AUTH WIDGET RENDER ───────────────────────────────────────────────────────
function renderAuthWidget() {
  const w = document.getElementById('auth-widget');
  if (!FIREBASE_READY) {
    w.innerHTML = `<button class="btn btn-ghost btn-sm" style="border-color:rgba(255,107,53,0.4);color:var(--accent)" onclick="document.getElementById('auth-backdrop').classList.add('show')">⚠ Setup Firebase</button>`;
    return;
  }
  if (currentUser) {
    const initials = currentUser.displayName?.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase() || '?';
    w.innerHTML = currentUser.photoURL
      ? `<img class="auth-avatar" src="${currentUser.photoURL}" alt="">
         <span class="auth-name">${currentUser.displayName||'User'}</span>
         <button class="btn btn-ghost btn-sm" onclick="window._signOut()">Sign out</button>`
      : `<div class="auth-avatar-initials">${initials}</div>
         <span class="auth-name">${currentUser.displayName||'User'}</span>
         <button class="btn btn-ghost btn-sm" onclick="window._signOut()">Sign out</button>`;
  } else {
    w.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="document.getElementById('auth-backdrop').classList.add('show')">Sign in</button>`;
  }
}

// expose for game logic
window._currentUser = () => currentUser;
window._firebaseReady = () => FIREBASE_READY;

renderAuthWidget();

// ─── AUTH MODAL BUTTONS ───────────────────────────────────────────────────────
document.getElementById('google-signin-btn').addEventListener('click', window._signInWithGoogle);
document.getElementById('guest-continue-btn').addEventListener('click', () => {
  document.getElementById('auth-backdrop').classList.remove('show');
});
document.getElementById('auth-close-btn').addEventListener('click', () => {
  document.getElementById('auth-backdrop').classList.remove('show');
});

// expose upperSubtotal for module scope
window._upperSubtotal = (p) => {
  return ['ones','twos','threes','fours','fives','sixes'].reduce((t,c)=>t+(p.scores[c]||0),0);
};
</script>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const CATS = [
  {id:'ones',            name:'Ones',            section:'upper'},
  {id:'twos',            name:'Twos',            section:'upper'},
  {id:'threes',          name:'Threes',          section:'upper'},
  {id:'fours',           name:'Fours',           section:'upper'},
  {id:'fives',           name:'Fives',           section:'upper'},
  {id:'sixes',           name:'Sixes',           section:'upper'},
  {id:'three-of-a-kind', name:'Three of a Kind', section:'lower'},
  {id:'four-of-a-kind',  name:'Four of a Kind',  section:'lower'},
  {id:'full-house',      name:'Full House',      section:'lower'},
  {id:'small-straight',  name:'Small Straight',  section:'lower'},
  {id:'large-straight',  name:'Large Straight',  section:'lower'},
  {id:'yatzy',           name:'Yatzy',           section:'lower'},
  {id:'chance',          name:'Chance',          section:'lower'},
];

// Dice pip positions
const PIPS = {
  1:[[50,50]],
  2:[[28,28],[72,72]],
  3:[[28,28],[50,50],[72,72]],
  4:[[28,28],[72,28],[28,72],[72,72]],
  5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
  6:[[28,25],[72,25],[28,50],[72,50],[28,75],[72,75]],
};
function dieSVG(val,held){
  const dots=PIPS[val]||[];
  const fill=held?'rgba(255,255,255,0.9)':'#fffffe';
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${dots.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="7" fill="${fill}"/>`).join('')}</svg>`;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let players=[], currentPlayer=0;
let dice=[1,1,1,1,1], held=[false,false,false,false,false];
let roll=1, turn=1;
let undoState=null;
let gameHistory=[];
let personalBest=JSON.parse(localStorage.getItem('yatzy_pb')||'{}');

// ─── PLAYER FACTORY ───────────────────────────────────────────────────────────
function makePlayer(name){
  return {name, scores:{}, yatzyBonuses:0, done:false};
}

// ─── SCORING ──────────────────────────────────────────────────────────────────
function counts(d){const c={};for(let i=1;i<=6;i++)c[i]=0;d.forEach(v=>c[v]++);return c;}
function sum(d){return d.reduce((a,b)=>a+b,0);}

function calcScore(cat,d){
  const c=counts(d),s=sum(d),vals=Object.values(c).filter(x=>x>0).sort((a,b)=>a-b);
  switch(cat){
    case 'ones':   return c[1]*1;
    case 'twos':   return c[2]*2;
    case 'threes': return c[3]*3;
    case 'fours':  return c[4]*4;
    case 'fives':  return c[5]*5;
    case 'sixes':  return c[6]*6;
    case 'three-of-a-kind': return Object.values(c).some(v=>v>=3)?s:0;
    case 'four-of-a-kind':  return Object.values(c).some(v=>v>=4)?s:0;
    case 'full-house':      return vals.length===2&&vals[0]===2&&vals[1]===3?25:0;
    case 'small-straight':{
      const u=[...new Set(d)].sort((a,b)=>a-b);
      return [[1,2,3,4],[2,3,4,5],[3,4,5,6]].some(st=>st.every(n=>u.includes(n)))?30:0;
    }
    case 'large-straight':{
      const u=[...new Set(d)].sort((a,b)=>a-b);
      return u.length===5&&((u[0]===1&&u[4]===5)||(u[0]===2&&u[4]===6))?40:0;
    }
    case 'yatzy': return Object.values(c).some(v=>v===5)?50:0;
    case 'chance': return s;
    default: return 0;
  }
}

// Joker score: when used as a bonus Yatzy in another category
function calcJokerScore(cat, d){
  // For joker: upper cats score face value; lower cats score full value
  const s=sum(d);
  switch(cat){
    case 'ones':   return counts(d)[1]*1;
    case 'twos':   return counts(d)[2]*2;
    case 'threes': return counts(d)[3]*3;
    case 'fours':  return counts(d)[4]*4;
    case 'fives':  return counts(d)[5]*5;
    case 'sixes':  return counts(d)[6]*6;
    case 'three-of-a-kind': return s;
    case 'four-of-a-kind':  return s;
    case 'full-house':      return 25;
    case 'small-straight':  return 30;
    case 'large-straight':  return 40;
    case 'chance':          return s;
    default: return 0;
  }
}

function upperSubtotal(p){
  return ['ones','twos','threes','fours','fives','sixes'].reduce((t,c)=>t+(p.scores[c]||0),0);
}
function bonus(p){return upperSubtotal(p)>=63?35:0;}
function lowerTotal(p){
  return ['three-of-a-kind','four-of-a-kind','full-house','small-straight','large-straight','yatzy','chance']
    .reduce((t,c)=>t+(p.scores[c]||0),0);
}
function yatzyBonusTotal(p){return (p.yatzyBonuses||0)*100;}
function grandTotal(p){return upperSubtotal(p)+bonus(p)+lowerTotal(p)+yatzyBonusTotal(p);}

// ─── JOKER DETECTION ──────────────────────────────────────────────────────────
// Returns true if current roll is a Yatzy AND the Yatzy box is already scored with 50
function isJokerRoll(p, d){
  const isYatzy = Object.values(counts(d)).some(v=>v===5);
  return isYatzy && p.scores['yatzy'] === 50;
}

// Joker forced category: matching upper section first, then any lower, then any upper
function getJokerForcedCategory(p, d){
  const dieValue = d[0]; // all same when it's a Yatzy
  const upperCatMap = {1:'ones',2:'twos',3:'threes',4:'fours',5:'fives',6:'sixes'};
  const matchingUpper = upperCatMap[dieValue];
  // 1. Must use matching upper if available
  if(p.scores[matchingUpper] === undefined) return {cat: matchingUpper, forced: true, type:'upper'};
  // 2. Any open lower category
  const lowerCats = ['three-of-a-kind','four-of-a-kind','full-house','small-straight','large-straight','chance'];
  for(const c of lowerCats){
    if(p.scores[c] === undefined) return {cat: c, forced: false, type:'lower'};
  }
  // 3. Any open upper category (scores 0)
  const upperCats = ['ones','twos','threes','fours','fives','sixes'];
  for(const c of upperCats){
    if(p.scores[c] === undefined) return {cat: c, forced: false, type:'upperZero'};
  }
  return null;
}

// ─── BEST SUGGESTION ──────────────────────────────────────────────────────────
function bestSuggestion(p, d){
  if(isJokerRoll(p,d)){
    const jf = getJokerForcedCategory(p,d);
    if(jf) return {id: jf.cat, val: jf.type==='upperZero'?0:calcJokerScore(jf.cat,d)};
  }
  let best=null, bestVal=-1;
  CATS.forEach(({id})=>{
    if(p.scores[id]!==undefined) return;
    const v=calcScore(id,d);
    if(v>bestVal){bestVal=v;best=id;}
  });
  return {id:best, val:bestVal};
}

// ─── DOM HELPERS ──────────────────────────────────────────────────────────────
function toast(msg, type='success'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;el.textContent=msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),2700);
}
function confetti(){
  const colors=['#ff6b35','#ffd166','#06d6a0','#118ab2','#f5c518','#ef476f'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[i%colors.length]};--dur:${1.2+Math.random()*1.5}s;--delay:${Math.random()*0.8}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  }
}

// ─── RENDER DICE ──────────────────────────────────────────────────────────────
function renderDice(){
  const row=document.getElementById('dice-row');
  row.innerHTML='';
  dice.forEach((val,i)=>{
    const wrap=document.createElement('div');
    wrap.className='die-wrap'+(held[i]?' held':'');
    wrap.innerHTML=`<div class="die" id="die-${i}">${dieSVG(val,held[i])}</div><div class="die-hold-label">${held[i]?'held':'hold'}</div>`;
    wrap.addEventListener('click',()=>toggleHold(i));
    row.appendChild(wrap);
  });
}

// ─── RENDER SCORECARD ─────────────────────────────────────────────────────────
function renderScorecard(){
  const p=players[currentPlayer];
  const body=document.getElementById('scorecard-body');
  const joker=roll>1&&isJokerRoll(p,dice);
  const jokerForced=joker?getJokerForcedCategory(p,dice):null;
  let html='';

  const rowHtml=(cat)=>{
    const sc=p.scores[cat.id];
    const scored=sc!==undefined;
    let pot=null;
    if(!scored && roll>1){
      pot=joker ? calcJokerScore(cat.id, dice) : calcScore(cat.id, dice);
    }
    const {id:bestId}=roll>1?bestSuggestion(p,dice):{};
    let cls='score-row';
    if(scored) cls+=' scored';
    else if(pot!==null) cls+=' available';
    if(!scored && cat.id===bestId && roll>1) cls+=' best-suggestion';
    if(joker && jokerForced && cat.id===jokerForced.cat && !scored) cls+=' joker-forced';
    const potCls=pot>0?'row-potential bright':'row-potential';
    const yatzyStars = cat.id==='yatzy' && scored && sc===50 ? ` ⭐` : '';
    return `<div class="${cls}" data-cat="${cat.id}">
      <div class="row-name">${cat.name}${yatzyStars}</div>
      <div class="row-score">${scored?sc:'—'}</div>
      <div class="${potCls}">${pot!==null?pot:''}</div>
    </div>`;
  };

  const ust=upperSubtotal(p), bon=bonus(p);
  html+=`<div class="section-sep">Upper Section</div>`;
  CATS.filter(c=>c.section==='upper').forEach(c=>{html+=rowHtml(c);});
  html+=`<div class="total-row"><div class="row-name">Subtotal</div><div class="row-score">${ust}</div><div></div></div>`;
  html+=`<div class="total-row"><div class="row-name">Bonus (63+)</div><div class="row-score" style="color:var(--gold)">${bon}</div><div></div></div>`;

  const lt=lowerTotal(p);
  html+=`<div class="section-sep">Lower Section</div>`;
  CATS.filter(c=>c.section==='lower').forEach(c=>{html+=rowHtml(c);});

  // Yatzy bonus line — always visible once Yatzy is scored
  if(p.scores['yatzy']!==undefined){
    const yb=p.yatzyBonuses||0;
    html+=`<div class="yatzy-bonus-row">
      <div class="row-name">⭐ Yatzy bonus ×${yb}</div>
      <div class="row-score">+${yb*100}</div>
      <div></div>
    </div>`;
  }

  html+=`<div class="total-row"><div class="row-name">Lower total</div><div class="row-score">${lt+yatzyBonusTotal(p)}</div><div></div></div>`;
  const gt=grandTotal(p);
  html+=`<div class="grand-row"><div class="row-name">Grand Total</div><div class="row-score">${gt}</div><div></div></div>`;

  body.innerHTML=html;
  body.querySelectorAll('.score-row').forEach(row=>{
    row.addEventListener('click',()=>{
      const cat=row.dataset.cat;
      if(!cat||roll===1) return;
      const p2=players[currentPlayer];
      // Joker mode: only allow scoring if the category is the forced one (or any open if no forced)
      if(joker){
        if(jokerForced){
          if(cat!==jokerForced.cat){
            // Only block if the forced cat is still open
            if(p2.scores[jokerForced.cat]===undefined){
              toast(`Must score ${CATS.find(c=>c.id===jokerForced.cat).name} first!`,'warn');
              return;
            }
          }
        }
        if(p2.scores[cat]!==undefined) return;
        scoreCategory(cat, true);
        return;
      }
      if(p2.scores[cat]!==undefined) return;
      scoreCategory(cat, false);
    });
  });
}

// ─── RENDER PLAYERS BAR ───────────────────────────────────────────────────────
function renderPlayersBar(){
  const bar=document.getElementById('players-bar');
  bar.innerHTML='';
  players.forEach((p,i)=>{
    const tab=document.createElement('div');
    tab.className='player-tab'+(i===currentPlayer?' active':'')+(p.done?' done':'');
    const gt=grandTotal(p);
    tab.innerHTML=`<div class="player-name">${p.name}</div>
      <div class="player-score-display">${gt}</div>
      <div class="player-tag">${p.done?'Finished':'Turn '+turn+'/13'}</div>`;
    bar.appendChild(tab);
  });
}

function renderBonusMeter(){
  const p=players[currentPlayer];
  const ust=upperSubtotal(p);
  const pct=Math.min(100,(ust/63)*100);
  document.getElementById('bonus-fill').style.width=pct+'%';
  document.getElementById('bonus-progress-label').textContent=`${ust} / 63`;
}

function renderJokerBanner(){
  const p=players[currentPlayer];
  const banner=document.getElementById('joker-banner');
  if(roll>1 && isJokerRoll(p,dice)){
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

function renderSuggestion(){
  const el=document.getElementById('suggestion');
  if(roll===1){el.classList.add('hidden');return;}
  const p=players[currentPlayer];
  const {id,val}=bestSuggestion(p,dice);
  if(!id){el.classList.add('hidden');return;}
  const cat=CATS.find(c=>c.id===id);
  el.classList.remove('hidden');
  document.getElementById('suggestion-text').innerHTML=`Score <strong>${cat.name}</strong> for <strong>${val} pts</strong>`;
}

function renderHeader(){
  document.getElementById('hdr-turn').textContent=turn;
  document.getElementById('hdr-roll').textContent=roll;
  const btn=document.getElementById('roll-btn');
  if(roll>3){btn.textContent='Select category';btn.disabled=true;}
  else{btn.textContent=`Roll dice (${roll}/3)`;btn.disabled=false;}
}

function render(){
  renderDice();
  renderScorecard();
  renderPlayersBar();
  renderBonusMeter();
  renderJokerBanner();
  renderSuggestion();
  renderHeader();
}

// ─── GAME ACTIONS ─────────────────────────────────────────────────────────────
function doRoll(){
  if(roll>3||players[currentPlayer].done) return;
  dice.forEach((_,i)=>{if(!held[i]) dice[i]=Math.floor(Math.random()*6)+1;});
  roll++;
  document.querySelectorAll('.die-wrap').forEach((w,i)=>{
    if(!held[i]){
      const d=w.querySelector('.die');
      d.classList.remove('rolling');void d.offsetWidth;
      d.classList.add('rolling');
      setTimeout(()=>d.classList.remove('rolling'),520);
    }
  });
  setTimeout(render,100);
}

function toggleHold(i){
  if(roll===1||players[currentPlayer].done) return;
  held[i]=!held[i];
  renderDice();renderSuggestion();
}

function releaseAll(){
  held=[false,false,false,false,false];
  renderDice();
}

// isJoker: true when this scoring was triggered as a bonus Yatzy joker
function scoreCategory(cat, isJoker=false){
  const p=players[currentPlayer];
  if(p.scores[cat]!==undefined||roll===1) return;

  // Save undo state
  undoState={cat, turn, roll, dice:[...dice], held:[...held], currentPlayer,
             yatzyBonuses: p.yatzyBonuses, wasJoker: isJoker};

  let sc;
  if(isJoker){
    // Award 100 bonus + joker category score
    p.yatzyBonuses = (p.yatzyBonuses||0) + 1;
    sc = calcJokerScore(cat, dice);
    // Flash gold
    setTimeout(()=>{
      const row=document.querySelector(`[data-cat="${cat}"]`);
      if(row){row.classList.add('yatzy-flash');setTimeout(()=>row.classList.remove('yatzy-flash'),700);}
    },50);
    toast(`⭐ Bonus Yatzy! +100 bonus, ${CATS.find(c=>c.id===cat).name}: ${sc} pts`,'success');
    confetti();
  } else {
    sc=calcScore(cat,dice);
    setTimeout(()=>{
      const row=document.querySelector(`[data-cat="${cat}"]`);
      if(row){row.classList.add('flash');setTimeout(()=>row.classList.remove('flash'),700);}
    },50);
    const catName=CATS.find(c=>c.id===cat).name;
    if(sc===50&&cat==='yatzy'){toast('🎉 YATZY! 50 points!','success');confetti();}
    else if(sc===0) toast(`${catName}: 0 pts`,'info');
    else toast(`${catName}: ${sc} pts`,'success');
  }

  p.scores[cat]=sc;
  gameHistory.push({player:p.name, cat:CATS.find(c=>c.id===cat).name, sc, turn, joker:isJoker});
  document.getElementById('undo-btn').disabled=false;
  advanceTurn();
}

function advanceTurn(){
  if(checkAllDone()){endGame();return;}
  let nextP=(currentPlayer+1)%players.length;
  let loops=0;
  while(players[nextP].done&&loops<players.length){nextP=(nextP+1)%players.length;loops++;}
  currentPlayer=nextP;
  const doneCount=Object.keys(players[currentPlayer].scores).length;
  turn=doneCount+1;
  dice=[1,1,1,1,1];held=[false,false,false,false,false];roll=1;
  doRoll();
}

function checkAllDone(){
  return players.every(p=>Object.keys(p.scores).length===13);
}

function undoScore(){
  if(!undoState) return;
  const {cat, currentPlayer:cp, yatzyBonuses, wasJoker}=undoState;
  delete players[cp].scores[cat];
  if(wasJoker) players[cp].yatzyBonuses=yatzyBonuses;
  currentPlayer=cp;
  dice=[...undoState.dice];
  held=[...undoState.held];
  roll=undoState.roll;
  turn=undoState.turn;
  undoState=null;
  document.getElementById('undo-btn').disabled=true;
  gameHistory.pop();
  render();
  toast('Score undone','info');
}

// ─── END GAME ─────────────────────────────────────────────────────────────────
function endGame(){
  const sorted=[...players].sort((a,b)=>grandTotal(b)-grandTotal(a));
  const winner=sorted[0];
  const winnerGt=grandTotal(winner);

  // Save to Firestore if signed in (single player or winner)
  if(window._saveScoreToFirestore){
    window._saveScoreToFirestore(winner, winnerGt);
  }

  let pbMsg='';
  if(!personalBest[winner.name]||winnerGt>personalBest[winner.name]){
    personalBest[winner.name]=winnerGt;
    localStorage.setItem('yatzy_pb',JSON.stringify(personalBest));
    if(players.length===1) pbMsg=`<div class="pb-badge">🏆 New personal best!</div>`;
  }

  let html=`<h2>${players.length>1?'Game Over!':'Well played!'}</h2>`;
  if(players.length>1) html+=`<div class="modal-sub">🏆 ${winner.name} wins!</div>`;
  html+=pbMsg;

  if(players.length===1){
    const yb=winner.yatzyBonuses||0;
    html+=`<div class="final-big">${winnerGt}</div>`;
    if(yb>0) html+=`<div style="color:var(--gold);font-size:0.9em;margin-bottom:8px">includes ${yb}× Yatzy bonus (+${yb*100})</div>`;
    if(personalBest[winner.name]) html+=`<div style="color:var(--text3);font-size:0.85em;margin-bottom:20px">Personal best: ${personalBest[winner.name]}</div>`;
    if(!window._currentUser||!window._currentUser()){
      html+=`<div style="font-size:0.82em;color:var(--text3);margin-bottom:16px">Sign in to save this score to the leaderboard</div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('auth-backdrop').classList.add('show')" style="margin-bottom:12px">Sign in</button><br>`;
    }
  } else {
    html+=`<table class="score-table" style="margin:20px 0">`;
    sorted.forEach((p,i)=>{
      const gt=grandTotal(p);
      const yb=p.yatzyBonuses||0;
      html+=`<tr><td>${i===0?'🥇':i===1?'🥈':'🥉'} ${p.name}${yb>0?` <span style="color:var(--gold);font-size:0.85em">+${yb*100} bonus</span>`:''}</td><td>${gt}</td></tr>`;
    });
    html+=`</table>`;
  }

  document.getElementById('gameover-content').innerHTML=html;
  document.getElementById('gameover-backdrop').classList.add('show');
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function renderHistory(){
  const list=document.getElementById('history-list');
  if(!list.classList.contains('open')) return;
  if(gameHistory.length===0){list.innerHTML='<div style="color:var(--text3);font-size:0.82em;padding:6px 0">No scores yet</div>';return;}
  list.innerHTML=gameHistory.slice().reverse().slice(0,15).map(h=>
    `<div class="history-entry"><span>${h.player} — ${h.cat}${h.joker?' ⭐':''}</span><span>${h.joker?`${h.sc}+100`:h.sc}</span></div>`
  ).join('');
}

// ─── SETUP ────────────────────────────────────────────────────────────────────
let setupN=1;
const defaultNames=['Player 1','Player 2','Player 3','Player 4'];

function renderSetup(){
  document.getElementById('count-btns').querySelectorAll('.count-btn').forEach(b=>{
    b.classList.toggle('active',parseInt(b.dataset.n)===setupN);
  });
  const inp=document.getElementById('player-inputs');
  inp.innerHTML='';
  // Pre-fill player 1 name from Google if signed in
  const user=window._currentUser?window._currentUser():null;
  for(let i=0;i<setupN;i++){
    const defaultVal=(i===0&&user)?user.displayName||defaultNames[i]:defaultNames[i];
    inp.innerHTML+=`<div class="player-input-row">
      <input class="player-input" type="text" placeholder="${defaultNames[i]}" value="${defaultVal}" id="pname-${i}" maxlength="16">
    </div>`;
  }
}

function startGame(names){
  players=names.map(n=>makePlayer(n));
  currentPlayer=0;turn=1;
  dice=[1,1,1,1,1];held=[false,false,false,false,false];roll=1;
  undoState=null;gameHistory=[];
  document.getElementById('setup-backdrop').classList.remove('show');
  document.getElementById('gameover-backdrop').classList.remove('show');
  document.getElementById('undo-btn').disabled=true;
  doRoll();render();
}

// ─── EVENT LISTENERS ──────────────────────────────────────────────────────────
document.getElementById('roll-btn').addEventListener('click',doRoll);
document.getElementById('release-btn').addEventListener('click',releaseAll);
document.getElementById('undo-btn').addEventListener('click',undoScore);
document.getElementById('new-game-btn').addEventListener('click',()=>{
  document.getElementById('setup-backdrop').classList.add('show');
  renderSetup();
});
document.getElementById('replay-same-btn').addEventListener('click',()=>{
  startGame(players.map(p=>p.name));
});
document.getElementById('new-players-btn').addEventListener('click',()=>{
  document.getElementById('gameover-backdrop').classList.remove('show');
  document.getElementById('setup-backdrop').classList.add('show');
  renderSetup();
});
document.getElementById('history-toggle').addEventListener('click',()=>{
  const list=document.getElementById('history-list');
  const open=list.classList.toggle('open');
  document.getElementById('history-toggle').textContent=open?'Hide score history ▴':'Show score history ▾';
  renderHistory();
});
document.getElementById('count-btns').querySelectorAll('.count-btn').forEach(b=>{
  b.addEventListener('click',()=>{setupN=parseInt(b.dataset.n);renderSetup();});
});
document.getElementById('start-btn').addEventListener('click',()=>{
  const names=[];
  for(let i=0;i<setupN;i++){
    const v=document.getElementById(`pname-${i}`)?.value.trim();
    names.push(v||defaultNames[i]);
  }
  startGame(names);
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderSetup();
</script>
</body>
</html>
